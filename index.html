<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiversProj</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1a1d24;
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --admin-accent: #ff7b72;
            --hover-bg: #1f242c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #30363d;
            margin-bottom: 15px;
            background-color: var(--card-bg);
            transition: border-color 0.3s ease;
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            letter-spacing: -0.05em;
        }

        h2 {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin: 0;
            font-weight: 400;
        }

        .links-section {
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 60px;
            align-items: center;
        }

        .link-group {
            background-color: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .link-group h3 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.1rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: center;
        }

        #admin-vault {
            display: none; 
            border-color: var(--admin-accent);
            box-shadow: 0 0 15px rgba(255, 123, 114, 0.1);
        }
        
        #admin-vault h3 {
            color: var(--admin-accent);
        }

        .link-btn {
            display: block;
            background-color: var(--hover-bg);
            color: var(--text-main);
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 8px;
            margin-bottom: 12px;
            text-align: center;
            font-weight: 500;
            border: 1px solid transparent;
            transition: all 0.2s ease-in-out;
        }

        .link-btn:last-child {
            margin-bottom: 0;
        }

        .link-btn:hover {
            background-color: #262c36;
            border-color: #8b949e;
            transform: translateY(-2px);
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .gallery-header h3 {
            font-size: 1.5rem;
            margin: 0;
        }

        .gallery-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .gallery-item {
            position: relative;
            padding-top: 100%;
            overflow: hidden;
            border-radius: 10px;
            background-color: var(--card-bg);
            border: 1px solid #30363d;
        }

        .gallery-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.08);
        }

        /* CAPTION STYLES */
        .caption-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 17, 21, 0.85);
            color: var(--text-main);
            padding: 12px;
            font-size: 0.9rem;
            text-align: center;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            backdrop-filter: blur(4px);
            border-top: 1px solid #30363d;
            z-index: 10;
        }

        .gallery-item:hover .caption-overlay {
            transform: translateY(0);
        }
        
        /* ADMIN SNIPPET STYLES */
        .admin-snippet {
            display: none; /* Hidden by default */
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--admin-accent);
            color: #000;
            padding: 4px 8px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 4px;
            z-index: 20;
            user-select: all; /* Makes it easy to copy with one click */
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        
        /* When body has this class, reveal the snippets */
        body.admin-mode-active .admin-snippet {
            display: block;
        }

        .loading-text {
            text-align: center;
            grid-column: 1 / -1;
            color: var(--text-muted);
            padding: 40px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img id="dynamic-pfp" class="profile-pic" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Liver B">
            <h1>Liver B</h1>
            <h2>Photographer / Developer</h2>
        </header>

        <div class="links-section">
            
            <div class="link-group" id="admin-vault">
                <h3>Admin Vault</h3>
                <a href="https://your-secret-link-1.com" class="link-btn" target="_blank">Secret Stash 1</a>
                <a href="https://your-secret-link-2.com" class="link-btn" target="_blank">Secret Project</a>
            </div>

            <div class="link-group">
                <h3>Experiments</h3>
                <a href="/bubble" class="link-btn" target="_blank" rel="noopener noreferrer">Livers Water World</a>
                <a href="/rpg" class="link-btn" target="_blank" rel="noopener noreferrer">The One Where You Die</a>
                <a href="/map/index" class="link-btn" target="_blank" rel="noopener noreferrer">McMap</a>
            </div>

            <div class="link-group">
                <h3>Socials</h3>
                <a href="https://youtube.com/@xliv3r" class="link-btn" target="_blank" rel="noopener noreferrer">YouTube: @xliv3r</a>
            </div>

            <div class="link-group">
                <h3>IdiotsWithKnifes</h3>
                <a href="https://bsky.app/profile/idiots-with-knifes.itch.io" class="link-btn" target="_blank" rel="noopener noreferrer">Bluesky</a>
                <a href="https://idiots-with-knifes.itch.io" class="link-btn" target="_blank" rel="noopener noreferrer">Itch.io</a>
            </div>
        </div>

        <div class="gallery-section">
            <div class="gallery-header">
                <h3>Live Photo Stream</h3>
                <p>Auto-synced from my mobile photo album</p>
            </div>
            <div class="gallery" id="gallery-container">
                <div class="loading-text">Fetching latest photos...</div>
            </div>
        </div>
    </div>

    <script>
        // --- ADMIN EASTER EGG LOGIC ---
        let keyBuffer = "";
        const secretCode = "adminpasswordlmao";

        document.addEventListener('keydown', (e) => {
            keyBuffer += e.key.toLowerCase();
            if (keyBuffer.length > secretCode.length) {
                keyBuffer = keyBuffer.slice(keyBuffer.length - secretCode.length);
            }
            if (keyBuffer === secretCode) {
                // Reveal the vault
                document.getElementById('admin-vault').style.display = 'block';
                // Highlight PFP
                document.getElementById('dynamic-pfp').style.borderColor = '#ff7b72'; 
                // Toggle snippet overlays on photos
                document.body.classList.add('admin-mode-active');
                
                keyBuffer = ""; 
            }
        });

        // --- BACKUP CAPTION DICTIONARY ---
        const backupPhotoCaptions = {
            "AP1GczObmw5Uy_FA1FyPL": "Took downtown Rochester NY",
            "AP1GczPHMyF8zrcPZcste": "Caught at lakeside diner"
        };

        // --- API FETCH LOGIC ---
        document.addEventListener("DOMContentLoaded", () => {
            fetchLatestData();
        });

        async function fetchLatestData() {
            const container = document.getElementById('gallery-container');
            const pfpElement = document.getElementById('dynamic-pfp');
            
            const WORKER_URL = 'https://photoapi.kcanada6031-6d9.workers.dev/';

            try {
                const response = await fetch(WORKER_URL);
                if (!response.ok) throw new Error("API response error");
                
                const data = await response.json();
                
                if (data.pfpUrl) {
                    pfpElement.src = data.pfpUrl;
                }

                const images = data.images; 
                container.innerHTML = ''; 

                if (!images || images.length === 0) {
                    container.innerHTML = '<div class="loading-text">No photos found in the album.</div>';
                    return;
                }

                images.forEach(imgData => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';

                    const img = document.createElement('img');
                    img.src = imgData.url;
                    img.alt = imgData.caption || 'Google Photos Update';
                    img.loading = 'lazy';

                    item.appendChild(img);
                    
                    // Extract the clean ID snippet for the admin overlay
                    // This pulls out the ~20 character string right after "/pw/"
                    const urlMatch = imgData.url.match(/\/pw\/([a-zA-Z0-9\-_=]{20})/);
                    if (urlMatch && urlMatch[1]) {
                        const snippetDiv = document.createElement('div');
                        snippetDiv.className = 'admin-snippet';
                        snippetDiv.textContent = urlMatch[1];
                        item.appendChild(snippetDiv);
                    }

                    // 1. Try to use the dynamic native caption first
                    let finalCaption = imgData.caption;

                    // 2. Fallback: If no native caption was found, check the backup dictionary
                    if (!finalCaption) {
                        for (const urlSnippet in backupPhotoCaptions) {
                            if (imgData.url.includes(urlSnippet)) {
                                finalCaption = backupPhotoCaptions[urlSnippet];
                                break;
                            }
                        }
                    }

                    // Add the caption overlay if either method succeeded
                    if (finalCaption) {
                        const captionDiv = document.createElement('div');
                        captionDiv.className = 'caption-overlay';
                        captionDiv.textContent = finalCaption;
                        item.appendChild(captionDiv);
                    }

                    container.appendChild(item);
                });

            } catch (error) {
                console.error("Failed to fetch data:", error);
                container.innerHTML = '<div class="loading-text">Unable to load live data. Showing fallback mode.</div>';
            }
        }
    </script>
</body>
</html>
