<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiversProj - McMap</title>
    
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #228B22; 
            font-family: sans-serif;
        }
        
        #map { 
            width: 100vw; 
            height: 100vh; 
            image-rendering: pixelated;
        }

        /* Custom Pointer & Marker Styling */
        #user-arrow {
            width: 48px;
            height: 48px;
            transition: transform 0.1s linear; 
            transform-origin: center center; 
            image-rendering: pixelated; 
            filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.5));
            position: relative;
            z-index: 10;
        }

        .custom-marker {
            background: transparent;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Warning Banner */
        #warning-banner {
            display: none;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff3333;
            color: white;
            padding: 15px 20px;
            font-weight: bold;
            border-radius: 8px;
            z-index: 9999;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* Search Bar */
        #search-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: white;
            border-radius: 30px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            overflow: hidden;
            z-index: 1000;
            width: 90%;
            max-width: 400px;
        }

        #search-input {
            flex-grow: 1;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            outline: none;
        }

        #search-btn {
            background: #2979ff;
            color: white;
            border: none;
            padding: 0 20px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #search-btn:hover { background: #1c5fd6; }

        /* Sync Indicator */
        #loading-indicator {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 1000;
        }

        /* Back to You Button */
        #recenter-btn {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background: #ffffff;
            color: #333333;
            border: 2px solid #cccccc;
            padding: 12px 18px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            transition: background 0.2s, transform 0.1s;
        }

        #recenter-btn:hover { background: #f0f0f0; }
        #recenter-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="warning-banner">
        ⚠️ BROWSER BLOCKING IMAGES!<br>
        You must run a local web server to see custom textures.
    </div>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="Search places, addresses...">
        <button id="search-btn">Search</button>
    </div>
    
    <button id="recenter-btn">📍 Back to You</button>
    <div id="loading-indicator">🔄 Connecting to server...</div>
    
    <div id="map"></div>
    
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    
    <script>
        // Security Check
        if (window.location.protocol === 'file:') {
            document.getElementById('warning-banner').style.display = 'block';
        }

        // Firebase Root Endpoint
        const FIREBASE_BASE_URL = "https://device-streaming-bcd35341-default-rtdb.firebaseio.com/";

        // Initialize Map
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
            center: [-77.43, 43.21], // Webster, NY area default
            zoom: 13
        });

        const loadMapImage = (url, id) => {
            return new Promise((resolve) => {
                map.loadImage(url, (error, image) => {
                    if (error) { resolve(null); } 
                    else {
                        map.addImage(id, image);
                        resolve(id);
                    }
                });
            });
        };

        // Intercept layers and apply ground/water textures
        map.on('style.load', async () => {
            await Promise.all([
                loadMapImage('water.png', 'custom-water'),
                loadMapImage('grass.png', 'custom-grass')
            ]);

            const layers = map.getStyle().layers;

            layers.forEach(layer => {
                const id = layer.id.toLowerCase();

                if (id.includes('water') || id.includes('river') || id.includes('lake') || id.includes('ocean')) {
                    if (layer.type === 'fill' && map.hasImage('custom-water')) {
                        map.setPaintProperty(layer.id, 'fill-pattern', 'custom-water');
                        map.setPaintProperty(layer.id, 'fill-color', 'transparent');
                    }
                }
                else if (id.includes('background') || id.includes('land') || id.includes('park') || id.includes('grass')) {
                    if (map.hasImage('custom-grass')) {
                        if (layer.type === 'background') {
                            map.setPaintProperty(layer.id, 'background-pattern', 'custom-grass');
                            map.setPaintProperty(layer.id, 'background-color', 'transparent');
                        } else if (layer.type === 'fill') {
                            map.setPaintProperty(layer.id, 'fill-pattern', 'custom-grass');
                            map.setPaintProperty(layer.id, 'fill-color', 'transparent');
                        }
                    }
                }
            });
            
            // Download backend data pools after style maps compile
            initializeServerSync();
        });

        // ----------------------------------------------------
        // Server Sync & Local Geometry Evaluation Engine
        // ----------------------------------------------------
        let globalLocationsPool = [];

        async function initializeServerSync() {
            const statusEl = document.getElementById('loading-indicator');
            try {
                // Fetch both city-specific nodes and full state tables simultaneously
                const [resCities, resStates] = await Promise.all([
                    fetch(`${FIREBASE_BASE_URL}locations.json`),
                    fetch(`${FIREBASE_BASE_URL}state_locations.json`)
                ]);

                const dataCities = await resCities.json() || {};
                const dataStates = await resStates.json() || {};

                // Flatten all multi-city and multi-state objects into one high-performance query array
                const processBranch = (rootNode) => {
                    for (const branch in rootNode) {
                        if (Array.isArray(rootNode[branch])) {
                            globalLocationsPool.push(...rootNode[branch]);
                        }
                    }
                };

                processBranch(dataCities);
                processBranch(dataStates);

                statusEl.innerText = `🟢 Server Synced (${globalLocationsPool.length} places)`;
                setTimeout(() => statusEl.style.display = 'none', 3000);

                // Initial plot run across active screen bounds
                renderActivePlaces();

            } catch (err) {
                console.error("Firebase connection broken:", err);
                statusEl.innerText = "🔴 Server Sync Offline";
                statusEl.style.background = "#ff3333";
            }
        }

        function renderActivePlaces() {
            if (globalLocationsPool.length === 0) return;

            const bounds = map.getBounds();
            
            // Clean up old search marker if it left the screen view bounding context
            if (searchMarker && !bounds.contains(searchMarker.getLngLat())) {
                searchMarker.remove();
                searchMarker = null;
            }

            // High-speed filtering evaluating whether a point falls within viewport boundaries
            const visibleFeatures = globalLocationsPool
                .filter(poi => {
                    return poi.lng >= bounds.getWest() &&
                           poi.lng <= bounds.getEast() &&
                           poi.lat >= bounds.getSouth() &&
                           poi.lat <= bounds.getNorth();
                })
                .map(poi => {
                    // Match fast-food categories versus standard shopping hubs
                    const isFood = /fast_food|restaurant|cafe|food_court|pub/i.test(poi.type);
                    return {
                        type: 'Feature',
                        geometry: { type: 'Point', coordinates: [poi.lng, poi.lat] },
                        properties: {
                            name: poi.name,
                            market_type: isFood ? 'fast_food' : 'supermarket'
                        }
                    };
                });

            const geojsonData = { type: 'FeatureCollection', features: visibleFeatures };

            if (map.getSource('local-places')) {
                map.getSource('local-places').setData(geojsonData);
            } else {
                map.addSource('local-places', { type: 'geojson', data: geojsonData });

                map.addLayer({
                    id: 'places-dots',
                    type: 'circle',
                    source: 'local-places',
                    paint: {
                        'circle-radius': 8,
                        'circle-color': [
                            'match',
                            ['get', 'market_type'],
                            'supermarket', '#3b82f6', 
                            'fast_food', '#ef4444',   
                            '#ffffff'
                        ],
                        'circle-stroke-width': 2,
                        'circle-stroke-color': '#ffffff'
                    }
                });

                map.addLayer({
                    id: 'places-labels',
                    type: 'symbol',
                    source: 'local-places',
                    layout: {
                        'text-field': ['get', 'name'],
                        'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
                        'text-size': 12,
                        'text-offset': [0, 1.2],
                        'text-anchor': 'top'
                    },
                    paint: {
                        'text-color': '#111111',
                        'text-halo-color': '#ffffff',
                        'text-halo-width': 3
                    }
                });
            }
        }

        // Re-render map layers using database array when the map viewport moves
        map.on('moveend', renderActivePlaces);

        // ----------------------------------------------------
        // Search Bar Engine (Uses local server data first!)
        // ----------------------------------------------------
        let searchMarker = null;

        const searchMarkerElement = document.createElement('div');
        searchMarkerElement.className = 'custom-marker';
        searchMarkerElement.innerHTML = `<img src="x.png" style="width: 32px; height: 32px; image-rendering: pixelated; filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));" alt="X" onerror="this.style.display='none'; this.parentElement.innerHTML='❌'; this.parentElement.style.fontSize='24px';">`;

        async function performSearch() {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            if (!query) return;

            document.getElementById('search-btn').innerText = "⏳";

            // 1. Local Search Check: Check if query matches an entity inside our loaded server array
            const localMatch = globalLocationsPool.find(poi => poi.name.toLowerCase().includes(query));

            if (localMatch) {
                map.flyTo({ center: [localMatch.lng, localMatch.lat], zoom: 16 });
                dropSearchXMarker(localMatch.lng, localMatch.lat);
                finalizeSearchUI();
                return;
            }

            // 2. Fallback: If not found on our server, use global Nominatim geocoder
            const fallbackUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`;
            try {
                const response = await fetch(fallbackUrl);
                const data = await response.json();

                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    
                    map.flyTo({ center: [lon, lat], zoom: 15 });
                    dropSearchXMarker(lon, lat);
                } else {
                    alert("Location context not found locally or internationally.");
                }
            } catch (err) {
                console.error("Global search error:", err);
            }
            finalizeSearchUI();
        }

        function dropSearchXMarker(lng, lat) {
            if (searchMarker) searchMarker.remove();
            searchMarker = new maplibregl.Marker({ element: searchMarkerElement })
                .setLngLat([lng, lat])
                .addTo(map);
        }

        function finalizeSearchUI() {
            document.getElementById('search-input').value = '';
            document.getElementById('search-btn').innerText = "Search";
        }

        document.getElementById('search-btn').addEventListener('click', performSearch);
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        // ----------------------------------------------------
        // Geolocation & Compass Engine
        // ----------------------------------------------------
        const markerElement = document.createElement('div');
        markerElement.className = 'custom-marker';
        markerElement.innerHTML = `<img src="mappointer.png" id="user-arrow" style="transform: rotate(0deg);" alt="Pointer">`;

        let userMarker = null;
        let currentCompassHeading = 0;

        function updatePointerRotation() {
            const arrowElement = document.getElementById('user-arrow');
            if (arrowElement) {
                const mapBearing = map.getBearing();
                const finalRotation = currentCompassHeading - mapBearing;
                arrowElement.style.transform = `rotate(${Math.round(finalRotation)}deg)`;
            }
        }

        map.on('rotate', updatePointerRotation);

        if ('geolocation' in navigator) {
            navigator.geolocation.watchPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;

                    if (!userMarker) {
                        userMarker = new maplibregl.Marker({ element: markerElement })
                            .setLngLat([lng, lat])
                            .addTo(map);
                        map.flyTo({ center: [lng, lat], zoom: 15 });
                    } else {
                        userMarker.setLngLat([lng, lat]);
                    }
                },
                (error) => { console.warn("Location context failure: ", error.message); },
                { enableHighAccuracy: true, maximumAge: 1000, timeout: 5000 }
            );
        }

        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientationabsolute', function(event) {
                if (event.alpha !== null) {
                    currentCompassHeading = 360 - event.alpha;
                    updatePointerRotation();
                }
            }, true);

            window.addEventListener('deviceorientation', function(event) {
                if (event.webkitCompassHeading) {
                    currentCompassHeading = event.webkitCompassHeading;
                    updatePointerRotation();
                } else if (event.alpha !== null && !('ondeviceorientationabsolute' in window)) {
                    currentCompassHeading = 360 - event.alpha;
                    updatePointerRotation();
                }
            }, true);
        }

        document.getElementById('recenter-btn').addEventListener('click', () => {
            if (userMarker) {
                map.flyTo({ center: userMarker.getLngLat(), zoom: 16 });
            } else {
                alert("Searching for active GPS connection...");
            }
        });
    </script>
</body>
</html>
