<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Painting App</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    background-color: #f0f0f0;
  }
  
  #toolbar {
    background-color: #333;
    color: white;
    padding: 12px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    align-items: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    z-index: 10;
  }
  
  .tool-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .palette {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
    background: #222;
    padding: 4px 8px;
    border-radius: 6px;
  }

  .swatch {
    width: 24px;
    height: 24px;
    border-radius: 4px;
    border: 2px solid transparent;
    cursor: pointer;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.2);
    transition: transform 0.1s;
  }

  .swatch:hover {
    transform: scale(1.1);
  }

  .swatch.active {
    border-color: white;
    box-shadow: 0 0 0 2px #007bff, inset 0 0 0 1px rgba(0,0,0,0.2);
    transform: scale(1.1);
  }

  /* Style the native color input to look exactly like the 17th swatch */
  input[type="color"].custom-swatch {
    width: 28px; /* Slightly larger to match standard swatches visually */
    height: 28px;
    padding: 0;
    border: 2px solid transparent;
    border-radius: 4px;
    cursor: pointer;
    background: linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet);
    -webkit-appearance: none;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.2);
  }
  
  input[type="color"].custom-swatch::-webkit-color-swatch-wrapper {
    padding: 0;
  }
  
  input[type="color"].custom-swatch::-webkit-color-swatch {
    border: none;
    border-radius: 2px;
  }

  input[type="color"].custom-swatch.active {
    border-color: white;
    box-shadow: 0 0 0 2px #007bff;
  }
  
  label {
    font-size: 14px;
    font-weight: 500;
  }
  
  input[type="range"] {
    cursor: pointer;
    width: 100px;
  }
  
  button {
    background-color: #555;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: background-color 0.2s;
  }
  
  button:hover {
    background-color: #777;
  }
  
  button.active {
    background-color: #007bff;
  }

  #exportBtn {
    background-color: #28a745; /* Green color to stand out */
  }

  #exportBtn:hover {
    background-color: #218838;
  }
  
  #canvas-container {
    flex-grow: 1;
    overflow: hidden;
    position: relative;
    cursor: crosshair;
  }
  
  canvas {
    background-color: white;
    display: block;
    touch-action: none; 
  }
</style>
</head>
<body>

<div id="toolbar">
  <!-- 16 Color Palette + 1 Custom -->
  <div class="tool-group">
    <div class="palette" id="paletteContainer">
      <!-- Standard swatches will be injected here via JS -->
      <input type="color" id="customColor" class="custom-swatch" title="Custom Color">
    </div>
  </div>
  
  <div class="tool-group">
    <label for="brushSize">Size:</label>
    <input type="range" id="brushSize" min="1" max="50" value="5">
  </div>

  <div class="tool-group">
    <button id="eraserBtn">Eraser</button>
    <button id="clearBtn">Clear</button>
    <button id="exportBtn">Export PNG</button>
  </div>
</div>

<div id="canvas-container">
  <canvas id="paintCanvas"></canvas>
</div>

<script>
  const canvas = document.getElementById('paintCanvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const canvasContainer = document.getElementById('canvas-container');
  
  const brushSize = document.getElementById('brushSize');
  const eraserBtn = document.getElementById('eraserBtn');
  const clearBtn = document.getElementById('clearBtn');
  const exportBtn = document.getElementById('exportBtn');
  
  const paletteContainer = document.getElementById('paletteContainer');
  const customColorInput = document.getElementById('customColor');

  // App State
  let isDrawing = false;
  let lastX = 0;
  let lastY = 0;
  let isEraserMode = false;
  let currentColor = '#000000'; // Default to black

  // 16 Default Colors (Classic Palette)
  const colors = [
    '#000000', '#808080', '#c0c0c0', '#ffffff', 
    '#800000', '#ff0000', '#808000', '#ffff00', 
    '#008000', '#00ff00', '#008080', '#00ffff', 
    '#000080', '#0000ff', '#800080', '#ff00ff'
  ];

  let swatchElements = [];

  // Build the palette
  function initPalette() {
    colors.forEach((color, index) => {
      const swatch = document.createElement('div');
      swatch.className = 'swatch';
      swatch.style.backgroundColor = color;
      if (index === 0) swatch.classList.add('active'); // Black active by default
      
      swatch.addEventListener('click', () => {
        setColor(color);
        setActiveSwatch(swatch);
      });
      
      // Insert before the custom color picker
      paletteContainer.insertBefore(swatch, customColorInput);
      swatchElements.push(swatch);
    });
  }

  function setActiveSwatch(activeElement) {
    // Remove active class from all swatches and the custom input
    swatchElements.forEach(s => s.classList.remove('active'));
    customColorInput.classList.remove('active');
    
    // Add active to the clicked element
    activeElement.classList.add('active');
  }

  function setColor(color) {
    currentColor = color;
    if (isEraserMode) {
      isEraserMode = false;
      eraserBtn.classList.remove('active');
    }
  }

  // Handle the 17th Custom Color Picker
  customColorInput.addEventListener('input', (e) => {
    setColor(e.target.value);
    setActiveSwatch(customColorInput);
  });
  
  customColorInput.addEventListener('click', () => {
    setColor(customColorInput.value);
    setActiveSwatch(customColorInput);
  });

  // Initialize and handle resizing
  function initCanvas() {
    let imageData = null;
    if (canvas.width > 0 && canvas.height > 0) {
      imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    }
    
    canvas.width = canvasContainer.clientWidth;
    canvas.height = canvasContainer.clientHeight;
    
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    
    if (imageData) {
      ctx.putImageData(imageData, 0, 0);
    } else {
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }

  initPalette();
  setTimeout(initCanvas, 0);
  window.addEventListener('resize', initCanvas);

  // Coordinate helper
  function getCoordinates(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: clientX - rect.left,
      y: clientY - rect.top
    };
  }

  // Core Drawing
  function startDrawing(e) {
    isDrawing = true;
    const { x, y } = getCoordinates(e);
    [lastX, lastY] = [x, y];
    
    ctx.beginPath();
    ctx.arc(x, y, brushSize.value / 2, 0, Math.PI * 2);
    ctx.fillStyle = isEraserMode ? 'white' : currentColor;
    ctx.fill();
    
    ctx.beginPath();
    ctx.moveTo(x, y);
  }

  function draw(e) {
    if (!isDrawing) return;
    if (e.cancelable) e.preventDefault(); 
    
    const { x, y } = getCoordinates(e);
    
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    ctx.strokeStyle = isEraserMode ? 'white' : currentColor;
    ctx.lineWidth = brushSize.value;
    ctx.stroke();
    
    [lastX, lastY] = [x, y];
  }

  function stopDrawing() {
    isDrawing = false;
  }

  // Mouse Listeners
  canvas.addEventListener('mousedown', startDrawing);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', stopDrawing);
  canvas.addEventListener('mouseout', stopDrawing);

  // Touch Listeners
  canvas.addEventListener('touchstart', startDrawing, { passive: false });
  canvas.addEventListener('touchmove', draw, { passive: false });
  canvas.addEventListener('touchend', stopDrawing);
  canvas.addEventListener('touchcancel', stopDrawing);

  // Toolbar Actions
  clearBtn.addEventListener('click', () => {
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  });

  eraserBtn.addEventListener('click', () => {
    isEraserMode = !isEraserMode;
    eraserBtn.classList.toggle('active');
    
    // Dim the color swatches slightly when erasing to show color is inactive
    if (isEraserMode) {
      swatchElements.forEach(s => s.classList.remove('active'));
      customColorInput.classList.remove('active');
    } else {
      // Re-activate the swatch that matches the current color, or custom if not found
      let found = false;
      swatchElements.forEach(s => {
        // Convert to rgb to match inline style output
        const divColor = document.createElement('div');
        divColor.style.color = currentColor;
        document.body.appendChild(divColor);
        const rgbColor = window.getComputedStyle(divColor).color;
        document.body.removeChild(divColor);

        if (s.style.backgroundColor === currentColor || s.style.backgroundColor === rgbColor) {
          s.classList.add('active');
          found = true;
        }
      });
      if (!found) customColorInput.classList.add('active');
    }
  });

  // Export to PNG Functionality
  exportBtn.addEventListener('click', () => {
    // Generate data URL from canvas
    const dataURL = canvas.toDataURL('image/png');
    
    // Create a temporary anchor link to trigger download
    const link = document.createElement('a');
    link.download = 'my_painting.png';
    link.href = dataURL;
    
    // Programmatically click it
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  });
</script>
</body>
</html>
